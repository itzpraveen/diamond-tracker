name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: diamond
          POSTGRES_USER: diamond
          POSTGRES_PASSWORD: diamond
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U diamond -d diamond"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg://diamond:diamond@127.0.0.1:5432/diamond
      SECRET_KEY: ci-secret-key
      ADMIN_USERNAME: ci-admin
      ADMIN_PASSWORD: ci-password
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: ./storage
      CORS_ORIGINS: http://localhost:3000
      PYTHONPATH: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: python -m pytest

  admin-web:
    name: Admin Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.14.0"
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install admin dependencies
        run: npm ci

      - name: Run TypeScript checks
        run: npx tsc --noEmit

      - name: Build admin app
        run: npm run build

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install mobile dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test
